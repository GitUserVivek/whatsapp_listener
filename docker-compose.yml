version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whatsapp
      POSTGRES_PASSWORD: whatsapp_pass
      POSTGRES_DB: whatsapp_webhooks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://whatsapp:whatsapp_pass@db:5432/whatsapp_webhooks
      - VERIFY_TOKEN=${VERIFY_TOKEN:-test_verify_token}
      - APP_SECRET=${APP_SECRET:-test_app_secret}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
